                { ID: "banner1", Type: "image", Name: "Promo Bundle AI", ImageUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop", Url: "https://example.com/promo", Category: "Semua", Visible: "true", ClickCount: 0 },
                { ID: "app2", Type: "link", Name: "Financial Tracker", Description: "Hitung aset dan investasi", Category: "Produktivitas", Url: "https://example.com/finance", IconClass: "fas fa-chart-pie", ColorClass: "text-emerald-600 dark:text-emerald-400", Visible: "true", ClickCount: 890, isLocked: false },

        const fetchData = async () => {
            try {
                document.getElementById('loading-spinner').classList.remove('hidden');
                
                if (isUsingPlaceholder) {
                    return new Promise(resolve => setTimeout(() => resolve(MOCK_DATA), 800));
                }

                const response = await fetch(`${SCRIPT_URL}?action=getData`);
                if (!response.ok) throw new Error("Network response was not ok");
                return await response.json();
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                return MOCK_DATA;
            }
        };

        const verifyAppPassword = async (appId, password) => {
            try {
                if (isUsingPlaceholder) {
                    return new Promise(resolve => {
                        setTimeout(() => {
                            const app = MOCK_DATA.apps.find(a => a.ID === appId);
                            if (app && app.Password === password) resolve({ success: true, url: app.Url });
                            else resolve({ success: false, message: "Sandi salah. Coba lagi." });
                        }, 600);
                    });
                }
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'verifyPassword', appId: appId, password: password }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                return await response.json();
            } catch (error) { return { success: false, message: "Koneksi terputus." }; }
        };

        const incrementAppClick = async (appId) => {
            if (isUsingPlaceholder) return;
            try {
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'incrementClick', appId: appId }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
            } catch (error) {}
        };

            currentApps = data.apps.filter(app => String(app.Visible).toLowerCase() === 'true');
            
            renderProfile(data.config);
            renderSocials(data.socials);
            renderCategories(currentApps);
            
            // Panggil fungsi update untuk merender list sesuai pagination
            updateDisplay();

            // Toggle form berlangganan sesuai config dari Sheets
            const vipSection = document.getElementById('vip-list-section');
            if (data.config.show_vip_form && String(data.config.show_vip_form).toLowerCase() === 'false') {
                vipSection.classList.add('hidden');
            } else {
                vipSection.classList.remove('hidden');
            }

            document.getElementById('loading-spinner').classList.add('hidden');
            const mainContent = document.getElementById('main-content');
            mainContent.classList.remove('hidden');
            setTimeout(() => { mainContent.classList.remove('opacity-0'); }, 50);

            document.getElementById('year').innerText = new Date().getFullYear();
            document.getElementById('footer-name').innerText = data.config.profile_name;
            document.getElementById('footer-text').innerText = data.config.footer_text || 'Designed with Glassmorphism.';

            setupSearch();
        }

        // --- FILTER & PAGINATION ENGINE ---
        function updateDisplay() {
            // 1. Filter Aplikasi
            let filteredApps = currentApps.filter(app => {
                const appCategories = (app.Category || '').split(',').map(c => c.trim());
                const name = (app.Name || '').toLowerCase();
                const desc = (app.Description || '').toLowerCase();
                
                const matchesSearch = name.includes(searchQuery) || desc.includes(searchQuery);
                const matchesCategory = activeCategory === 'Semua' || appCategories.includes(activeCategory);
                
                return matchesSearch && matchesCategory;
            });

            // 2. Pagination Slice
            const totalItems = filteredApps.length;
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const paginatedApps = filteredApps.slice(startIndex, endIndex);

            // 3. Render
            renderApps(paginatedApps);
            renderPagination(totalItems);
        }

        window.changePage = (pageNumber) => {
            currentPage = pageNumber;
            updateDisplay();
            // Scroll halus kembali ke atas daftar aplikasi
            const searchBox = document.getElementById('app-search');
            const y = searchBox.getBoundingClientRect().top + window.scrollY - 80;
            window.scrollTo({top: y, behavior: 'smooth'});
        };

        function renderPagination(totalItems) {
            const container = document.getElementById('pagination-container');
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            
            // Tombol Prev
            const prevDisabled = currentPage === 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : 'hover:bg-white/40 cursor-pointer';
            html += `<button onclick="changePage(${currentPage - 1})" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-xl glass transition-all ${prevDisabled}"><i class="fas fa-chevron-left text-xs"></i></button>`;
            
            // Tombol Nomor Halaman
            for (let i = 1; i <= totalPages; i++) {
                const activeClass = i === currentPage ? 'glass-active font-bold text-purple-600 scale-110 shadow-md' : 'hover:bg-white/40 cursor-pointer';
                html += `<button onclick="changePage(${i})" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-xl glass transition-all text-sm ${activeClass}">${i}</button>`;
            }
            
            // Tombol Next
            const nextDisabled = currentPage === totalPages ? 'opacity-30 cursor-not-allowed pointer-events-none' : 'hover:bg-white/40 cursor-pointer';
            html += `<button onclick="changePage(${currentPage + 1})" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-xl glass transition-all ${nextDisabled}"><i class="fas fa-chevron-right text-xs"></i></button>`;
            
            container.innerHTML = html;
        }

        window.filterCategory = (category) => {
            activeCategory = category;
            currentPage = 1; // Reset ke halaman 1 tiap ganti kategori
            
            const buttons = document.querySelectorAll('#category-container button');
            buttons.forEach(btn => btn.classList.remove('glass-active'));
            const activeBtn = document.getElementById(`btn-cat-${category.replace(/\s+/g, '-')}`);
            if(activeBtn) activeBtn.classList.add('glass-active');

            updateDisplay();
        };

        function setupSearch() {
            const searchInput = document.getElementById('app-search');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                currentPage = 1; // Reset ke halaman 1 tiap mengetik
                updateDisplay();
            });
        }

        // --- RENDER COMPONENTS ---
        function renderCategories(apps) {
            const container = document.getElementById('category-container');
            const allCats = apps.flatMap(a => (a.Category || '').split(',').map(c => c.trim()).filter(Boolean));
            const uniqueCats = [...new Set(allCats)].sort((a, b) => a.localeCompare(b));
            const finalCats = ['Semua', ...uniqueCats];

            container.innerHTML = finalCats.map(cat => {
                const id = `btn-cat-${cat.replace(/\s+/g, '-')}`;
                const baseClass = "px-5 py-2.5 rounded-2xl text-xs md:text-sm font-bold whitespace-nowrap transition-all outline-none snap-start glass glass-btn";
                const activeClass = cat === 'Semua' ? 'glass-active' : '';
                return `<button onclick="window.filterCategory('${cat}')" id="${id}" class="${baseClass} ${activeClass}">${cat}</button>`;
            }).join('');
        }

        function renderProfile(config) {
            document.getElementById('profile-name').innerText = config.profile_name;
            document.getElementById('profile-title').innerText = config.profile_title;
            document.getElementById('profile-image').src = config.profile_image;
            if (String(config.verified_badge).toLowerCase() === 'true') {
                document.getElementById('verified-badge').classList.remove('hidden');
            }
        }

        function renderSocials(socials) {
            const container = document.getElementById('socials-container');
            container.innerHTML = '';
            socials.filter(s => String(s.Visible).toLowerCase() === 'true').forEach((s, index) => {
                const a = document.createElement('a');
                a.href = s.Url;
                a.target = "_blank";
                const iconColor = s.ColorClass || '';
                a.className = `w-12 h-12 md:w-14 md:h-14 rounded-full glass glass-btn tap-effect flex items-center justify-center text-xl md:text-2xl group shadow-sm animate-stagger`;
                a.style.animationDelay = `${0.15 + (index * 0.05)}s`; 
                a.innerHTML = `<i class="${s.IconClass} ${iconColor} group-hover:scale-110 transition-transform"></i>`;
                container.appendChild(a);
            });
        }

        function renderApps(apps) {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';

            if (apps.length === 0) {
                container.innerHTML = `<div class="text-center py-8 opacity-50"><i class="fas fa-box-open text-3xl mb-3"></i><p class="text-sm">Tidak ada aplikasi yang ditemukan.</p></div>`;
                return;
            }

            apps.forEach((app, index) => {
                const isLocked = app.isLocked || false;
                const itemType = app.Type || 'link'; 
                
                const link = document.createElement('a');
                link.href = isLocked ? '#' : app.Url || '#';
                if(!isLocked && app.Url) link.target = '_blank';
                link.setAttribute('data-category', app.Category || '');

                if (isLocked) {
                    link.onclick = (e) => { e.preventDefault(); openPasswordModal(app.ID, app.Name, app.PasswordSourceUrl); };
                } else if (app.Url) {
                     link.addEventListener('click', () => incrementAppClick(app.ID));
                }

                // --- LOGIKA BADGE DINAMIS ---
                let customBadge = '';
                // Cek jika pengguna mengisi BadgeText dari Google Sheets (Dashboard)
                if (app.BadgeText && String(app.BadgeText).trim() !== '') {
                    const c1 = app.BadgeColor1 || '#ec4899'; // Default pink
                    const c2 = app.BadgeColor2 || '#8b5cf6'; // Default ungu
                    const ratio = app.BadgeRatio || '50';
                    
                    // Merakit style gradasi dinamis
                    const bgStyle = `background: linear-gradient(135deg, ${c1} ${ratio}%, ${c2} 100%); color: white;`;
                    
                    customBadge = `<div class="absolute top-0 right-0 rounded-bl-xl rounded-tr-[1.5rem] px-3 py-1 text-[10px] font-extrabold tracking-wider uppercase shadow-lg border-b border-l border-white/20 z-10" style="${bgStyle}">${app.BadgeText}</div>`;
                } else {
                    // Fallback ke sistem Badge 'HOT' otomatis jika BadgeText kosong tapi kliknya banyak
                    const isPopular = (app.ClickCount || 0) > 1000;
                    if (isPopular) {
                        customBadge = `<div class="absolute top-0 right-0 glass rounded-bl-xl rounded-tr-[1.5rem] px-3 py-1 text-[9px] font-bold text-red-500 uppercase border-t-0 border-r-0"><i class="fas fa-fire mr-1"></i>Hot</div>`;
                    }
                }

                if (itemType.toLowerCase() === 'image') {
                    link.className = `block w-full tap-effect rounded-[1.5rem] overflow-hidden relative group cursor-pointer animate-stagger shadow-md glass p-1`;
                    link.style.animationDelay = `${0.1 + (index * 0.05)}s`; 
                    
                    link.innerHTML = `
                        <div class="relative w-full rounded-[1.2rem] overflow-hidden">
                            <img src="${app.ImageUrl}" alt="${app.Name || 'Banner'}" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                        </div>
                    `;
                } else {
                    link.className = `block glass glass-card tap-effect rounded-[1.5rem] p-3 md:p-4 relative overflow-hidden group cursor-pointer animate-stagger`;
                    link.style.animationDelay = `${0.1 + (index * 0.05)}s`; 

                    const lockIcon = isLocked ? `<i class="fas fa-lock text-[10px] ml-2 opacity-50"></i>` : '';
                    const iconColor = app.ColorClass || '';

                    link.innerHTML = `
                        ${customBadge}
                        <div class="flex items-center gap-4 w-full relative z-0">
                            <div class="flex-shrink-0 w-12 h-12 md:w-16 md:h-16 rounded-xl md:rounded-[1.2rem] glass-input flex items-center justify-center ${iconColor} text-xl md:text-3xl group-hover:scale-110 transition-transform duration-300 shadow-sm border border-white/40">
                                <i class="${app.IconClass}"></i>
                            </div>
                            
                            <div class="flex-grow min-w-0 flex flex-col justify-center">
                                <h3 class="font-bold text-sm md:text-base truncate pr-2 flex items-center">
                                    ${app.Name} ${lockIcon}
                                </h3>
                                ${app.Description ? `<p class="text-xs opacity-70 truncate pr-2 mt-1">${app.Description}</p>` : ''}
                            </div>
                            
                            <div class="flex-shrink-0 flex items-center pr-2">
                                <div class="w-8 h-8 rounded-full glass flex items-center justify-center opacity-70 group-hover:opacity-100 group-hover:bg-white/20 transition-all">
                                    <i class="fas fa-chevron-right text-xs"></i>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                container.appendChild(link);
            });
        }

        // --- FUNGSI SUBMIT LEAD / NEWSLETTER DENGAN REDIRECT ---
        async function submitLeadForm(e) {
            e.preventDefault();
            const btn = document.getElementById('lead-submit-btn');
            const msg = document.getElementById('lead-msg');
            const name = document.getElementById('lead-name').value;
            const email = document.getElementById('lead-email').value;
            const wa = document.getElementById('lead-wa').value;

            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Memproses...';
            btn.disabled = true;
            msg.classList.add('hidden');

            try {
                if (isUsingPlaceholder) {
                    await new Promise(r => setTimeout(r, 1200));
                    msg.innerText = "Berhasil! Mengarahkan...";
                    msg.className = "text-xs text-center font-bold mt-3 text-green-500 block";
                    document.getElementById('lead-form').reset();
                    
                    // Logika Redirect Offline
                    setTimeout(() => {
                        if(globalConfig.vip_redirect_url && globalConfig.vip_redirect_url.trim() !== '') {
                            window.open(globalConfig.vip_redirect_url, '_blank');
                        }
                    }, 1500);

                } else {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'addLead', name: name, email: email, wa: wa }),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const res = await response.json();
                    
                    if (res.success) {
                        msg.innerText = "Terima kasih sudah bergabung! Mengarahkan...";
                        msg.className = "text-xs text-center font-bold mt-3 text-green-500 block";
                        document.getElementById('lead-form').reset();

                        // Logika Redirect Online (Mengambil data dari Google Sheets)
                        setTimeout(() => {
                            if(globalConfig.vip_redirect_url && globalConfig.vip_redirect_url.trim() !== '') {
                                window.open(globalConfig.vip_redirect_url, '_blank');
                            }
                        }, 1500); // Tunggu 1.5 detik agar tulisan "Terima kasih..." terbaca dulu

                    } else {
                        throw new Error("Respon server gagal.");
                    }
                }
            } catch (error) {
                msg.innerText = "Koneksi terputus. Silakan coba lagi.";
                msg.className = "text-xs text-center font-bold mt-3 text-red-500 block";
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                setTimeout(() => { msg.classList.add('hidden'); }, 4000);
            }
        }

        // --- PASSWORD MODAL ---
        window.togglePasswordVisibility = (inputId, btn) => {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        window.openPasswordModal = (appId, appName, passwordSourceUrl) => {
            const modal = document.getElementById('password-modal');
            const content = document.getElementById('password-modal-content');
            
            document.getElementById('locked-app-id').value = appId;
            document.getElementById('locked-app-name').innerText = appName;
            document.getElementById('app-password').value = '';
            document.getElementById('password-error').classList.add('hidden');

            const getPassBtn = document.getElementById('get-password-btn');
            if (passwordSourceUrl) {
                getPassBtn.href = passwordSourceUrl;
                getPassBtn.classList.remove('hidden');
            } else {
                getPassBtn.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
            document.getElementById('app-password').focus();
        };

        window.closePasswordModal = () => {
            const modal = document.getElementById('password-modal');
            const content = document.getElementById('password-modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        };

        document.getElementById('password-form').onsubmit = async (e) => {
            e.preventDefault();
            const appId = document.getElementById('locked-app-id').value;
            const password = document.getElementById('app-password').value;
            const btn = document.getElementById('unlock-btn');
            const errorMsg = document.getElementById('password-error');

            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const res = await verifyAppPassword(appId, password);
                if (res.success) {
                    incrementAppClick(appId);
                    window.open(res.url, '_blank');
                    closePasswordModal();
                } else {
                    errorMsg.innerText = res.message;
                    errorMsg.classList.remove('hidden');
                    const content = document.getElementById('password-modal-content');
                    content.classList.add('animate-pulse');
                    setTimeout(() => content.classList.remove('animate-pulse'), 300);
                }
            } catch (err) {
                errorMsg.innerText = "Koneksi terputus.";
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        function shareProfile() {
            if (navigator.share) {
                navigator.share({ title: document.title, url: window.location.href }).catch(console.error);
            } else {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = window.location.href;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0', 'pointer-events-none');
                setTimeout(() => toast.classList.add('opacity-0', 'pointer-events-none'), 3000);
            }
        }

        init();
    </script>
</body>
</html>
